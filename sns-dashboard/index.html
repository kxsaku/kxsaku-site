<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SNS · Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.kxsaku.com wss://api.kxsaku.com https://*.supabase.co wss://*.supabase.co https://api.stripe.com; img-src 'self' data: blob: https://api.kxsaku.com https://*.supabase.co; font-src 'self'; frame-src https://js.stripe.com;" />
  <script src="/assets/js/redirect.js" data-mobile-path="/sns-dashboard/mobile.html" data-breakpoint="820"></script>

  <link rel="stylesheet" href="/styles.css" />
<style>
  /* =============================================
     SNS Dashboard - Page-specific styles
     Uses /styles.css for base components
     ============================================= */

  /* Dashboard-specific body background with animated gradient */
  body {
    background:
      radial-gradient(1100px 420px at 50% -120px, rgba(120,95,255,.35), transparent 60%),
      radial-gradient(900px 520px at 20% 10%, rgba(70,35,160,.30), transparent 55%),
      radial-gradient(circle at top, #342067, #050315 55%, #020010);
  }

  /* Dashboard wrap override */
  .wrap { max-width: 1120px; margin: 0 auto; padding: 44px 18px 64px; }

  /* Top section */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  /* Page title */
  h1 {
    font-size: 14px;
  }

  /* Card glass effect for dashboard */
  .card {
    position: relative;
    background: linear-gradient(180deg, rgba(12,8,36,.70), rgba(8,5,28,.50));
    border: 1px solid var(--color-border);
    border-radius: 20px;
    padding: 18px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(16px);
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: -2px;
    background: radial-gradient(520px 220px at 18% 0%, var(--glow-accent), transparent 55%);
    pointer-events: none;
    opacity: 0.9;
  }
  .card > * { position: relative; z-index: 1; }

  /* Ghost button variant (maps to btn-ghost in styles.css but with local customization) */
  .btnGhost {
    background: rgba(255,255,255,.05);
    border-color: rgba(255,255,255,.14);
    box-shadow: none;
  }

  /* Inquiry detail layout */
  .inqMeta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 14px;
  }
  @media (max-width: 620px) {
    .inqMeta { grid-template-columns: 1fr; }
  }

  .kv {
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.04);
  }
  .kv .k {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--color-text-muted2);
    margin-bottom: 6px;
  }
  .kv .v {
    font-size: 13px;
    color: rgba(244,240,255,.92);
    word-break: break-word;
  }

  .note {
    margin-top: 12px;
    line-height: 1.5;
    color: var(--color-text-muted);
    font-size: 13px;
  }

  /* --------------------------
     Page + card animations
     -------------------------- */

  /* Subtle background drift */
  @keyframes bgFloat {
    0%   { background-position: 50% 0%, 20% 10%, 0% 0%; }
    50%  { background-position: 52% 6%, 18% 14%, 0% 0%; }
    100% { background-position: 50% 0%, 20% 10%, 0% 0%; }
  }

  /* Top header fades in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Cards "pop in" */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px) scale(.985); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  /* Soft highlight sweep across cards */
  @keyframes sheen {
    0%   { transform: translateX(-120%) rotate(12deg); opacity: 0; }
    15%  { opacity: .22; }
    40%  { opacity: .10; }
    100% { transform: translateX(140%) rotate(12deg); opacity: 0; }
  }

  /* Pills gently appear */
  @keyframes pillIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Apply bg drift to body */
  body {
    animation: bgFloat 14s ease-in-out infinite;
  }

  /* Animate header + grid on load */
  .top {
    animation: fadeUp .55s ease both;
  }

  /* Cards animate in with stagger */
  .card {
    opacity: 0;
    animation: cardIn .65s cubic-bezier(.2,.9,.2,1) both;
  }
  .card:nth-child(1) { animation-delay: .10s; }
  .card:nth-child(2) { animation-delay: .22s; }

  /* Add a sheen layer on cards */
  .card::after {
    content: "";
    position: absolute;
    top: -40%;
    left: -30%;
    width: 40%;
    height: 180%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
    filter: blur(1px);
    pointer-events: none;
    opacity: 0;
    transform: translateX(-120%) rotate(12deg);
    animation: sheen 4.8s ease-in-out infinite;
    animation-delay: 1.2s;
  }

  /* Pills animate in when visible */
  .pillrow .pill {
    opacity: 0;
    animation: pillIn .45s ease both;
  }
  .pillrow .pill:nth-child(1) { animation-delay: .35s; }
  .pillrow .pill:nth-child(2) { animation-delay: .42s; }
  .pillrow .pill:nth-child(3) { animation-delay: .49s; }
  .pillrow .pill:nth-child(4) { animation-delay: .56s; }

  /* Make the cards feel more "alive" on hover */
  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(190,180,255,.32);
    box-shadow: 0 26px 95px rgba(0,0,0,.62);
  }
  .card {
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  /* Dynamic content fade-in */
  @keyframes contentIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fadeIn {
    animation: contentIn .35s ease both;
  }

/* --------------------------
   Client Chat (Dashboard)
-------------------------- */

.chatWrap{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height: 420px;
}

.chatTop{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}

.chatMeta{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top: 8px;
}

.chatTag{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  border-radius:999px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.06);
  font-size: 12px;
  color: rgba(244,240,255,.86);
  line-height:1;
  white-space:nowrap;
}
.chatDot{
  width:9px; height:9px;
  border-radius:999px;
  display:inline-block;
  box-shadow: 0 0 0 2px rgba(255,255,255,.06);
  background: rgba(255,255,255,.18);
}
.chatDot.on{ background: rgba(108,255,176,.95); }
.chatDot.new{
  background: rgba(179,124,255,.95);
  box-shadow: 0 0 18px rgba(179,124,255,.35);
  animation: chatPulse 1.5s ease-in-out infinite;
}
@keyframes chatPulse{
  0%{ filter: brightness(1); }
  50%{ filter: brightness(1.35); }
  100%{ filter: brightness(1); }
}

.chatBody{
  position:relative;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(255,255,255,.04);
  border-radius: 16px;
  padding: 12px;
  height: 340px;
  overflow:auto;
  scroll-behavior:smooth;
}

.chatMsg{
  max-width: 82%;
  padding: 10px 12px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(10, 6, 32, .45);
  box-shadow: 0 10px 24px rgba(0,0,0,.18);
  margin: 8px 0;
}
.chatMsg.me{
  margin-left:auto;
  background: linear-gradient(180deg, rgba(140,125,255,.20), rgba(10, 6, 32, .45));
  border-color: rgba(160,150,255,.22);
}
.chatMsg.them{
  margin-right:auto;
  background: linear-gradient(180deg, rgba(90,160,255,.12), rgba(10, 6, 32, .45));
  border-color: rgba(90,160,255,.16);
}
.chatMsg.deleted{
  border-color: rgba(255,98,98,.28);
  background: rgba(10, 6, 32, .30);
}

.chatText{
  white-space: pre-wrap;
  line-height: 1.35;
  font-size: 13.5px;
  color: rgba(244,240,255,.92);
}

/* attachments */
.chatAtts{
  margin-top: .65rem;
  display:flex;
  flex-direction:column;
  gap:.65rem;
}
.chatImg{
  max-width: 100%;
  border-radius: 16px;
  border: 1px solid rgba(129,118,255,.18);
  display:block;
}
.chatFile{
  display:inline-flex;
  align-items:center;
  gap:.55rem;
  padding: .55rem .7rem;
  border-radius: 14px;
  border: 1px solid rgba(129,118,255,.18);
  background: rgba(9,6,34,.38);
  color: rgba(244,240,255,.88);
  text-decoration:none;
  width: fit-content;
}
.chatFile:hover{ border-color: rgba(179,124,255,.40); }


.chatFoot{
  margin-top: 8px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  font-size: 11.5px;
  color: rgba(244,240,255,.55);
}

.chatTools{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}

.chatMiniBtn{
  padding:6px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.05);
  color: rgba(244,240,255,.86);
  cursor:pointer;
  font-size: 11px;
  letter-spacing:.10em;
  text-transform:uppercase;
}
.chatMiniBtn:hover{ border-color: rgba(190,180,255,.35); }

.chatComposer{
  display:flex;
  gap:10px;
  align-items:flex-end;
  flex-wrap:wrap;
}

.chatInput{
  flex: 1 1 280px;
  border-radius: 14px;
  border: 1px solid rgba(160,150,255,.32);
  background: rgba(255,255,255,.05);
  padding: 10px 12px;
  color: rgba(244,240,255,.92);
  outline:none;
  min-height: 44px;
  max-height: 120px;
  resize: none;
}

.chatJump{
  position:absolute;
  right: 10px;
  bottom: 10px;
  opacity: 0;
  pointer-events:none;
  transform: translateY(6px);
  transition: opacity .12s ease, transform .12s ease;
}
.chatJump.on{
  opacity: 1;
  pointer-events:auto;
  transform: translateY(0);
}

.chatAttachTray{
  margin-top: 10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.chatChip{
  display:flex;
  align-items:center;
  gap:10px;
  padding: 10px 12px;
  border-radius: 999px;
  border: 1px solid rgba(160,150,255,.28);
  background: rgba(255,255,255,.06);
  color: rgba(244,240,255,.86);
  max-width: 100%;
}

.chatChipName{
  max-width: 320px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size: 12px;
}

.chatChipX{
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(255,255,255,.05);
  color: rgba(244,240,255,.8);
  border-radius: 999px;
  padding: 6px 10px;
  cursor:pointer;
  font-size: 11px;
  letter-spacing:.10em;
  text-transform:uppercase;
}
.chatChipX:hover{ border-color: rgba(190,180,255,.35); }

.chatDrop{
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index: 50;
}

.chatDropInner{
  padding: 18px 22px;
  border-radius: 16px;
  border: 1px solid rgba(170,160,255,.35);
  background: rgba(255,255,255,.07);
  color: rgba(244,240,255,.9);
  box-shadow: 0 0 18px rgba(160,120,255,.22);
  letter-spacing:.08em;
  text-transform: uppercase;
  font-size: 12px;
}

.chatAttRow{
  margin-top: 10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chatAttItem{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid rgba(160,150,255,.22);
  background: rgba(255,255,255,.05);
}

.chatAttLeft{
  display:flex;
  flex-direction:column;
  gap:2px;
  min-width: 0;
}

.chatAttName{
  font-size: 12.5px;
  color: rgba(244,240,255,.92);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width: 380px;
}

.chatAttMeta{
  font-size: 11px;
  color: rgba(244,240,255,.55);
}

.chatAtts{ margin-top:10px; display:flex; flex-direction:column; gap:10px; }
.chatAtt{ padding:10px; border:1px solid rgba(255,255,255,.10); border-radius:14px; background:rgba(255,255,255,.03); }
.chatAttMeta{ font-size:12px; opacity:.85; margin-top:8px; }
.chatAttLink{ font-size:12px; text-decoration:underline; opacity:.9; }
.chatImg{ width:100%; max-width:360px; border-radius:14px; display:block; }





</style>

</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>SNS Client Dashboard</h1>
        <div id="who" class="muted" style="margin-top:6px;"></div>
      </div>
      <button id="logout" class="btn">Logout</button>
    </div>

    <div class="grid">
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="cardTitle">Most Recent Inquiry</div>
            <div id="inqStatus" class="cardStatus">Loading…</div>
          </div>

          <button id="viewHistory" class="btn btnGhost">View Inquiry History</button>
        </div>

        <div class="divider"></div>

        <div id="inqBox"></div>
      </div>


      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="cardTitle">Subscription</div>
            <div id="subState" class="cardStatus">Loading…</div>
          </div>
        </div>

        <div class="pillrow">
          <div class="pill" id="subStatus"><strong>Status</strong>: —</div>
          <div class="pill" id="payStatus"><strong>Payment</strong>: —</div>
          <div class="pill" id="paidAmount"><strong>Paid</strong>: —</div>
          <div class="pill" id="periodEnd"><strong>Period End</strong>: —</div>
        </div>

        <div class="row">
          <button id="subscribeBtn" class="btn">Subscribe</button>
          <button id="manageBtn" class="btn btnGhost" style="display:none;">Manage My Subscription</button>
        </div>

        <div class="note">
          Your Network. Fortified.
        </div>
      </div>

      <div class="card">
  <div class="cardHeader">
    <div>
      <div class="cardTitle">Client Chat</div>
      <div id="chatState" class="cardStatus">Loading…</div>
      <div id="chatTyping" class="mutedSm" style="margin-top:6px; display:none;">Admin is typing…</div>


      <div class="chatMeta">
        <div class="chatTag"><span id="chatOnlineDot" class="chatDot"></span><span id="chatOnlineText">Offline</span></div>
        <div class="chatTag"><span id="chatUnreadDot" class="chatDot"></span><span id="chatUnreadText">No new messages</span></div>
      </div>
    </div>

    <div class="row" style="margin-top:0;">
      <button id="chatRefresh" class="btn btnGhost">Refresh</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="chatWrap">
    <div class="chatTop">
      <div class="mutedSm">Search only inside this chat:</div>
      <input id="chatSearch" class="search" style="margin-top:0;" placeholder="Search messages…" />
    </div>

    <div id="chatBody" class="chatBody">
      <div id="chatJump" class="chatJump">
        <button id="chatJumpBtn" class="btn btnGhost">Jump to newest</button>
      </div>
    </div>

    <div class="chatComposer">
      <input id="chatFile" type="file" multiple style="display:none" />
      <button id="chatAttachBtn" class="btn btnGhost" type="button" title="Attach files">Attach</button>

      <textarea id="chatInput" class="chatInput" placeholder="Type a message… (Enter = send, Shift+Enter = newline)"></textarea>
      <button id="chatSend" class="btn">Send</button>
    </div>

    <div id="chatAttachTray" class="chatAttachTray" style="display:none"></div>

    <div id="chatDrop" class="chatDrop" style="display:none">
      <div class="chatDropInner">Drop files to attach</div>
    </div>

    <div class="mutedSm" id="chatHint"></div>

  </div>
</div>


    </div>
  </div>

  <script src="/vendor/supabase-js.min.js" integrity="sha384-0VpB0wAYDdhWCEv3+IjT0Z9Kgpvszkf70RFX3ro7l4QR5nywxsMaOpmvZKsfRF8I" crossorigin="anonymous"></script>
  <script type="module" src="/assets/js/sns-dashboard-app.js"></script>
</body>
</html>
