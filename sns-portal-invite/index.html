<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SNS · Create Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.kxsaku.com wss://api.kxsaku.com https://*.supabase.co wss://*.supabase.co https://api.stripe.com; img-src 'self' data: blob: https://api.kxsaku.com https://*.supabase.co; font-src 'self'; frame-src https://js.stripe.com https://challenges.cloudflare.com;" />
  <!-- Cloudflare Turnstile CAPTCHA -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="/assets/js/redirect.js" data-mobile-path="/sns-portal-invite/mobile.html" data-breakpoint="820" data-preserve-search="true"></script>

  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* Page-specific: invite form layout */
    .invite-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1rem 4rem;
    }
    .invite-card {
      background: var(--color-surface-card);
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-xl);
      padding: 1.25rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(14px);
    }
    .invite-card h1 {
      margin: 0 0 .25rem;
      font-size: 1.1rem;
    }
    .invite-card p {
      margin: .4rem 0 1rem;
      color: var(--color-text-muted);
      line-height: 1.45;
    }
    .invite-card label {
      display: block;
      margin: .9rem 0 .35rem;
      font-size: .9rem;
      color: var(--color-text-label);
    }
    .invite-card input,
    .invite-card textarea,
    .invite-card select {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border-input);
      background: var(--color-surface-input);
      color: var(--color-text-primary);
      outline: none;
    }
    .invite-card input:focus,
    .invite-card textarea:focus,
    .invite-card select:focus {
      border-color: #9c88ff;
      box-shadow: 0 0 0 1px rgba(156, 136, 255, 0.55);
    }
    .invite-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 720px) {
      .invite-row { grid-template-columns: 1fr; }
    }
    .invite-btn {
      margin-top: 14px;
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-accent-soft);
      color: var(--color-text-primary);
      cursor: pointer;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: transform 0.08s ease, border-color 0.12s ease, filter 0.12s ease;
    }
    .invite-btn:hover {
      border-color: var(--color-accent);
      filter: brightness(1.05);
    }
    .invite-btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,.12);
      display: none;
    }
    .msg.err {
      background: rgba(255,55,120,.10);
      border-color: rgba(255,55,120,.35);
    }
    .msg.ok {
      background: rgba(80,255,180,.08);
      border-color: rgba(80,255,180,.28);
    }
    .meterWrap { margin-top: 8px; }
    .meterBar {
      height: 10px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.10);
      overflow: hidden;
    }
    .meterFill {
      height: 100%;
      width: 0%;
      transition: width .2s ease;
    }
    .hint {
      font-size: .85rem;
      color: var(--color-text-muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="invite-wrap">
    <div class="invite-card">
      <h1>Create Your SNS Account</h1>
      <p>Set your password and confirm your business details. This account is invite-only.</p>

      <div id="msg" class="msg"></div>

      <form id="form">
        <label>Email</label>
        <input id="email" type="email" disabled />

        <div class="invite-row">
          <div>
            <label>Password</label>
            <input id="pw" type="password" autocomplete="new-password" placeholder="Create a password" />
            <div class="meterWrap">
              <div class="meterBar"><div id="meterFill" class="meterFill"></div></div>
              <div id="meterText" class="hint">Must be 7–30 chars and include: 1 uppercase, 1 number, 1 special.</div>
            </div>
          </div>
          <div>
            <label>Confirm Password</label>
            <input id="pw2" type="password" autocomplete="new-password" placeholder="Re-type password" />
          </div>
        </div>

        <hr style="border:none;border-top:1px solid rgba(255,255,255,.10); margin: 18px 0;" />

        <div class="invite-row">
          <div>
            <label>Contact Name</label>
            <input id="contact_name" />
          </div>
          <div>
            <label>Business Name</label>
            <input id="business_name" />
          </div>
        </div>

        <div class="invite-row">
          <div>
            <label>Phone</label>
            <input id="phone" placeholder="+1..." />
          </div>
          <div>
            <label>Business Location</label>
            <input id="business_location" placeholder="City, State (or full address if you want)" />
          </div>
        </div>

        <label>Mailing Address</label>
        <input id="mailing_address" placeholder="Street, City, State, ZIP" />

        <div style="margin-top:10px;">
          <label style="display:flex; gap:10px; align-items:center; margin:0;">
            <input id="billing_same" type="checkbox" style="width:auto;" checked />
            Billing Address is the same as Mailing Address
          </label>
        </div>

        <div id="billingWrap" style="display:none;">
          <label>Billing Address</label>
          <input id="billing_address" placeholder="Street, City, State, ZIP" />
        </div>

        <!-- Cloudflare Turnstile CAPTCHA — TEST KEY, replace with real site key from Cloudflare Dashboard -->
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAC1o4UuVJmbO1jR2" data-theme="dark" data-callback="onTurnstileSuccess" data-expired-callback="onTurnstileExpired" style="margin-top:10px;"></div>

        <button id="submitBtn" class="invite-btn" type="submit">Create Account</button>
      </form>
    </div>
  </div>

  <script src="/vendor/supabase-js.min.js" integrity="sha384-0VpB0wAYDdhWCEv3+IjT0Z9Kgpvszkf70RFX3ro7l4QR5nywxsMaOpmvZKsfRF8I" crossorigin="anonymous"></script>
<script src="/assets/js/sns-portal-invite-app.js"></script>
    </body>
    </html>
